<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recipes Section — BiomeAndMind</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #27AE60;
  --green-dark: #1a7a42;
  --green-deep: #0F3320;
  --green-light: #E8F5EE;
  --cream: #F0F5E8;
  --text: #0F3320;
  --text-muted: #5A6B52;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); }

.section-label {
  font-size: 13px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--green); margin-bottom: 16px;
  display: block;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 3.5vw, 48px);
  font-weight: 700; color: var(--green-deep); line-height: 1.15;
}
.reveal { opacity: 1; }

/* ─── RECIPES SECTION ─── */
.section-recipes {
  padding: 100px 48px;
  background: var(--cream);
  overflow: hidden;
  position: relative;
}
.section-recipes::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(39,174,96,0.2), transparent);
}
.recipes-header {
  max-width: 1200px;
  margin: 0 auto 56px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 32px;
}
.recipes-count-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--green-light);
  border: 1px solid rgba(39,174,96,0.2);
  border-radius: 100px;
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--green-dark);
}
.recipes-tabs {
  display: flex;
  gap: 8px;
  max-width: 1200px;
  margin: 0 auto 40px;
  flex-wrap: wrap;
}
.recipe-tab {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 22px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid rgba(39,174,96,0.18);
  background: white;
  color: var(--text-muted);
  transition: all 0.22s ease;
  user-select: none;
  font-family: 'DM Sans', sans-serif;
}
.recipe-tab:hover { border-color: var(--green); color: var(--green); }
.recipe-tab.active {
  background: var(--green);
  border-color: var(--green);
  color: white;
  box-shadow: 0 4px 16px rgba(39,174,96,0.28);
}
.recipes-grid-wrap { max-width: 1200px; margin: 0 auto; }
.recipes-panel {
  display: none;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  animation: recipesFadeIn 0.35s ease forwards;
}
.recipes-panel.active { display: grid; }
@keyframes recipesFadeIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.recipes-footer {
  max-width: 1200px;
  margin: 40px auto 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 36px;
  background: var(--green-deep);
  border-radius: 24px;
  gap: 24px;
}
.recipes-footer-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; color: white; margin-bottom: 4px;
}
.recipes-footer-sub { font-size: 14px; color: rgba(255,255,255,0.5); }
.recipes-footer-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--green); color: white;
  padding: 14px 28px; border-radius: 100px;
  font-size: 15px; font-weight: 600;
  text-decoration: none; white-space: nowrap; flex-shrink: 0;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(39,174,96,0.35);
  font-family: 'DM Sans', sans-serif;
}
.recipes-footer-btn:hover { background: var(--green-dark); transform: translateY(-2px); }

@media (max-width: 900px) {
  .section-recipes { padding: 72px 24px; }
  .recipes-header { flex-direction: column; align-items: flex-start; }
  .recipes-panel { grid-template-columns: 1fr; }
  .recipes-footer { flex-direction: column; text-align: center; }
}
@media (min-width: 901px) and (max-width: 1100px) {
  .recipes-panel { grid-template-columns: repeat(2, 1fr); }
}
</style>
<link rel="stylesheet" href="recipes.css"/>
</head>
<body>

<section class="section-recipes" id="recipes">

  <div class="recipes-header">
    <div>
      <span class="section-label">What's cooking</span>
      <h2 class="section-title" style="margin-bottom:0">30 gut-brain recipes,<br/>built into the app.</h2>
    </div>
    <div>
      <div class="recipes-count-badge">&#x1F957; 30 recipes across 4 categories</div>
    </div>
  </div>

  <div class="recipes-tabs">
    <button class="recipe-tab active" onclick="switchRecipeTab('fermented',this)">&#x1F9EA; Fermented</button>
    <button class="recipe-tab" onclick="switchRecipeTab('prebiotic',this)">&#x1F33F; Prebiotic</button>
    <button class="recipe-tab" onclick="switchRecipeTab('healing',this)">&#x1F49A; Gut Healing</button>
    <button class="recipe-tab" onclick="switchRecipeTab('brain',this)">&#x1F9E0; Brain Foods</button>
  </div>

  <div class="recipes-grid-wrap">
    <div class="recipes-panel active" id="recipes-fermented"></div>
    <div class="recipes-panel" id="recipes-prebiotic"></div>
    <div class="recipes-panel" id="recipes-healing"></div>
    <div class="recipes-panel" id="recipes-brain"></div>
  </div>

  <div class="recipes-footer">
    <div>
      <div class="recipes-footer-title">Every recipe logs to your Gut-Brain Score.</div>
      <div class="recipes-footer-sub">One tap adds it to your daily tracker. No manual entry.</div>
    </div>
    <a href="#download" class="recipes-footer-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Try Free &mdash; 7 Days
    </a>
  </div>

</section>

<!-- Recipe Detail Modal -->
<div class="recipe-modal-overlay" id="recipeModal">
  <div class="recipe-modal" id="recipeModalContent"></div>
</div>

<script src="recipes.js"></script>
<script>
function switchRecipeTab(tabId, btn) {
  document.querySelectorAll('.recipe-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.recipes-panel').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  var panel = document.getElementById('recipes-' + tabId);
  if (panel) panel.classList.add('active');
}
</script>
</body>
</html>
